name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  # ── Build web + Android release APK ────────────────────────────
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android build tools
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;35.0.0" "platforms;android-35" 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK (unsigned)
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.tag }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

  # ── Publish GitHub Release ─────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-${{ needs.build.outputs.version }}
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/app-release-unsigned.apk
          body: |
            ## Domino Pro ${{ needs.build.outputs.version }}

            ### Install

            **Android**: Download `app-release-unsigned.apk` below.
            > Note: This APK is unsigned. For Play Store distribution, sign with your release keystore first.

            **iOS**: Build locally with Xcode (see README).

  # ── Webhook notification ───────────────────────────────────────
  notify:
    name: Notify Release Webhook
    runs-on: ubuntu-latest
    needs: [build, publish]
    if: vars.WEBHOOK_URL != ''

    steps:
      - name: Send release webhook
        run: |
          curl -s -X POST "${{ vars.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "release_published",
              "repo": "${{ github.repository }}",
              "version": "${{ needs.build.outputs.version }}",
              "release_url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.build.outputs.version }}",
              "triggered_by": "${{ github.actor }}"
            }'
